name: Build COFFLoader

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -G "Visual Studio 17 2022" -A x64 -DBUILD_BOFS=OFF

      - name: Build
        run: cmake --build build --config Release --target COFFLoader

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: COFFLoader
          path: build/Release/COFFLoader.exe
